<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow — 6-Day Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #f43f5e;
  --rose-light: #fda4af;
  --violet: #8b5cf6;
  --violet-light: #c4b5fd;
  --amber: #f59e0b;
  --teal: #14b8a6;
  --teal-light: #99f6e4;
  --period-pink: #f472b6;
  --period-rose: #fb7185;
  --bg: linear-gradient(160deg, #fdf2f8 0%, #ede9fe 40%, #ecfdf5 70%, #fff1f2 100%);
  --hero-orb: radial-gradient(ellipse 85% 85% at 50% 8%, rgba(139,92,246,0.28) 0%, rgba(244,63,94,0.16) 45%, transparent 72%);
  --hero-orb2: radial-gradient(ellipse 55% 45% at 50% 58%, rgba(244,63,94,0.15) 0%, transparent 70%);
  --text-primary: #1e1b4b;
  --text-secondary: #6366f1;
  --text-muted: #9ca3af;
  --card-bg: rgba(255,255,255,0.55);
  --card-border: rgba(255,255,255,0.72);
  --sheet-bg: rgba(255,255,255,0.93);
  --sheet-border: rgba(255,255,255,0.72);
  --row-bg: rgba(255,255,255,0.52);
  --row-border: rgba(255,255,255,0.68);
  --row-hover: rgba(255,255,255,0.82);
  --section-divider: rgba(139,92,246,0.1);
  --timer-text: #1e1b4b;
  --timer-sub: #6366f1;
  --status-track: rgba(139,92,246,0.1);
  --pelvic-bg: rgba(244,114,182,0.07);
  --pelvic-border: rgba(244,114,182,0.18);
  --yoga-bg: rgba(20,184,166,0.07);
  --yoga-border: rgba(20,184,166,0.18);
  --rest-border: rgba(139,92,246,0.18);
  --progress-card: rgba(255,255,255,0.5);
  --handle: rgba(139,92,246,0.18);
  --glass-shadow: rgba(139,92,246,0.12);
}
body.moonlight {
  --bg: linear-gradient(160deg, #090514 0%, #110925 40%, #0d1e21 70%, #170719 100%);
  --hero-orb: radial-gradient(ellipse 85% 85% at 50% 8%, rgba(139,92,246,0.42) 0%, rgba(244,63,94,0.2) 45%, transparent 72%);
  --hero-orb2: radial-gradient(ellipse 55% 45% at 50% 58%, rgba(244,63,94,0.14) 0%, transparent 70%);
  --text-primary: #f1f0fb;
  --text-secondary: #c4b5fd;
  --text-muted: #6b7280;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.09);
  --sheet-bg: rgba(10,6,26,0.97);
  --sheet-border: rgba(255,255,255,0.07);
  --row-bg: rgba(255,255,255,0.04);
  --row-border: rgba(255,255,255,0.07);
  --row-hover: rgba(255,255,255,0.09);
  --section-divider: rgba(139,92,246,0.14);
  --timer-text: #f1f0fb;
  --timer-sub: #a78bfa;
  --status-track: rgba(139,92,246,0.18);
  --pelvic-bg: rgba(244,114,182,0.05);
  --pelvic-border: rgba(244,114,182,0.12);
  --yoga-bg: rgba(20,184,166,0.04);
  --yoga-border: rgba(20,184,166,0.1);
  --rest-border: rgba(139,92,246,0.12);
  --progress-card: rgba(255,255,255,0.03);
  --handle: rgba(255,255,255,0.12);
  --glass-shadow: rgba(0, 0, 0, 0.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text-primary);overflow-x:hidden;transition:background 0.5s;}

/* ── PAGE STRUCTURE ── */
.page{position:relative;min-height:100vh;}

/* ── NAV ── */
nav{
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.2);
  transition: background 0.3s, border-color 0.3s;
}
body.moonlight nav {
  background: rgba(10, 6, 26, 0.4);
  border-bottom-color: rgba(255,255,255,0.05);
}

.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--text-primary);}
.logo span{background:linear-gradient(135deg,var(--rose),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.theme-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--card-bg);border:1px solid var(--card-border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:17px;backdrop-filter:blur(14px);
  transition:transform 0.2s,background 0.3s;
}
.theme-btn:hover{transform:scale(1.1);}

/* ── FIXED FLOATING STOPWATCH PILL (BOTTOM CENTER) ── */
.bottom-sw-pill {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  z-index: 1100;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--sheet-bg);
  border: 1px solid var(--sheet-border);
  padding: 10px 20px;
  border-radius: 40px;
  box-shadow: 0 10px 30px var(--glass-shadow);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
body.moonlight .bottom-sw-pill {
  background: rgba(18, 11, 37, 0.95);
  border-color: rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
body.scrolled .bottom-sw-pill {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.b-pill-icon {
  font-size: 16px;
}
.b-pill-time {
  font-family: monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--timer-text);
  letter-spacing: -0.5px;
}
.b-pill-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(139, 92, 246, 0.10);
  color: var(--rose);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: background 0.2s, transform 0.1s;
}
body.moonlight .b-pill-btn {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
}
.b-pill-btn:hover {
  background: rgba(244, 63, 94, 0.2);
}
.b-pill-btn:active {
  transform: scale(0.9);
}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:450px;
  display:flex;flex-direction:column;align-items:center;
  overflow:visible;z-index:1;
  padding-top: 80px; /* Offset fixed nav */
  padding-bottom:60px;
}

/* Large glowing orb — the centrepiece like the reference image */
.orb{
  position:absolute;
  top:-80px;left:50%;
  transform:translateX(-50%);
  width:min(560px,115vw);
  height:min(560px,115vw);
  border-radius:50%;
  background:var(--hero-orb);
  pointer-events:none;z-index:0;
  transition:background 0.6s;
}
.orb::after{
  content:'';position:absolute;inset:-30px;border-radius:50%;
  background:var(--hero-orb2);
}
/* Orb breathes when stopwatch is running */
.orb.active{animation:orbBreathe 2.6s ease-in-out infinite;}
@keyframes orbBreathe{
  0%,100%{transform:translateX(-50%) scale(1);opacity:1;}
  50%{transform:translateX(-50%) scale(1.05);opacity:0.88;}
}

/* ── STOPWATCH ── */
.sw-area{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:30px 24px 0;width:100%;
}
.sw-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:12px;opacity:0.75;}

.sw-time{
  font-family:monospace;
  font-size:clamp(54px,13vw,78px);
  font-weight:700;letter-spacing:-3px;line-height:1;
  color:var(--timer-text);margin-bottom:6px;
  transition:color 0.4s;
}
.sw-time.lit{color:var(--rose);}

.sw-sub{font-size:13px;color:var(--timer-sub);opacity:0.8;margin-bottom:26px;height:18px;transition:opacity 0.3s;}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:28px;}

.side-btn{
  width:46px;height:46px;border-radius:50%;
  background:var(--card-bg);border:1px solid var(--card-border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;backdrop-filter:blur(14px);color:var(--text-primary);
  transition:transform 0.2s,background 0.2s;
}
.side-btn:hover{background:var(--row-hover);}
.side-btn:active{transform:scale(0.88);}
.side-btn.spin{animation:spinAnim 0.55s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes spinAnim{0%{transform:rotate(0)scale(1)}40%{transform:rotate(-210deg)scale(0.78)}100%{transform:rotate(0)scale(1)}}

/* PLAY BUTTON */
.play-wrap{position:relative;width:92px;height:92px;}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--rose);opacity:0;pointer-events:none;
}
.play-wrap.running .ring:nth-child(1){animation:ringOut 2s 0s ease-out infinite;}
.play-wrap.running .ring:nth-child(2){animation:ringOut 2s 0.68s ease-out infinite;}
.play-wrap.running .ring:nth-child(3){animation:ringOut 2s 1.36s ease-out infinite;}
@keyframes ringOut{0%{transform:scale(1);opacity:0.65;}100%{transform:scale(2.3);opacity:0;}}

.play-btn{
  position:relative;z-index:4;
  width:92px;height:92px;border-radius:50%;
  background:linear-gradient(135deg,var(--rose),var(--violet));
  border:3.5px solid rgba(255,255,255,0.28);
  box-shadow:0 8px 30px rgba(244,63,94,0.42);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275),box-shadow 0.4s;
}
.play-btn:hover{transform:scale(1.07);}
.play-btn:active{transform:scale(0.92);}
.play-btn.glow{animation:btnPulse 1.9s ease-in-out infinite;}
@keyframes btnPulse{
  0%,100%{box-shadow:0 8px 30px rgba(244,63,94,0.42);}
  50%{box-shadow:0 8px 48px rgba(244,63,94,0.72),0 0 0 10px rgba(244,63,94,0.1);}
}
.play-btn svg{width:30px;height:30px;fill:white;}
.play-btn.bounce svg{animation:iconBounce 0.38s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes iconBounce{0%{transform:scale(0.3)rotate(-25deg);opacity:0;}100%{transform:scale(1)rotate(0);opacity:1;}}

/* STATUS */
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:34px;}
.s-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;transition:background 0.4s,box-shadow 0.4s;}
.s-dot.on{background:var(--teal);box-shadow:0 0 10px var(--teal);animation:dotBeat 1.6s ease-in-out infinite;}
@keyframes dotBeat{0%,100%{box-shadow:0 0 4px var(--teal);}50%{box-shadow:0 0 16px var(--teal),0 0 28px rgba(20,184,166,0.28);}}
.s-label{font-size:13px;font-weight:500;color:var(--text-secondary);opacity:0.85;}

/* ── WEEK NAV ── */
.nav-float{position:relative;z-index:20;display:flex;justify-content:center;margin-bottom:-26px;}
.week-nav{
  display:flex;gap:4px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:40px;padding:5px;
  backdrop-filter:blur(22px);
  box-shadow:0 8px 30px rgba(139,92,246,0.13);
}
.week-btn{
  padding:9px 18px;border-radius:28px;
  font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--text-primary);
  font-family:'DM Sans',sans-serif;
  transition:background 0.22s,color 0.22s,transform 0.18s;
}
.week-btn:hover{background:var(--row-hover);}
.week-btn.active{
  background:linear-gradient(135deg,var(--rose),var(--violet));
  color:white;box-shadow:0 4px 16px rgba(244,63,94,0.32);
  transform:translateY(-1px);
}
.week-btn.pd-btn{color:var(--period-pink);}
.week-btn.pd-btn.active{background:linear-gradient(135deg,#f472b6,#fb7185);box-shadow:0 4px 16px rgba(244,114,182,0.38);}

/* ── CONTENT SHEET ── */
.sheet {
  position:relative;z-index:10;
  background:var(--sheet-bg);
  backdrop-filter:blur(30px) saturate(180%);
  border-top-left-radius:38px;border-top-right-radius:38px;
  border:1px solid var(--sheet-border);border-bottom:none;
  box-shadow:0 -6px 40px rgba(139,92,246,0.09);
  padding:46px 20px 110px;
  min-height:60vh;
  transition:background 0.5s;
}
.sheet.animate{animation:sheetUp 0.52s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes sheetUp{from{transform:translateY(28px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.handle{width:44px;height:5px;background:var(--handle);border-radius:3px;margin:0 auto 28px;}

/* Reset flash */
.rflash {
  position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(244,63,94,0.13),transparent 68%);
  animation:flashOut 0.65s ease-out;
}
@keyframes flashOut{0%{opacity:1;}100%{opacity:0;}}

.content{max-width:860px;margin:0 auto;}

/* ── DAY CARDS ── */
.dcard,.pdcard{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:22px;margin-bottom:14px;overflow:hidden;
  backdrop-filter:blur(16px);
  box-shadow:0 4px 22px rgba(139,92,246,0.055);
  transition:transform 0.28s,box-shadow 0.28s;
  animation:cardUp 0.42s ease both;
}
.dcard:nth-child(2){animation-delay:0.04s}
.dcard:nth-child(3){animation-delay:0.08s}
.dcard:nth-child(4){animation-delay:0.12s}
.dcard:nth-child(5){animation-delay:0.16s}
.dcard:nth-child(6){animation-delay:0.20s}
.dcard:nth-child(7){animation-delay:0.24s}
@keyframes cardUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.dcard:hover,.pdcard:hover{transform:translateY(-2px);box-shadow:0 10px 34px rgba(139,92,246,0.11);}

.dhead{padding:17px 20px;cursor:pointer;display:flex;align-items:center;gap:13px;user-select:none;}
.dnum,.pdnum{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;
  color:white;flex-shrink:0;
}
.pdnum{font-size:17px;background:linear-gradient(135deg,#f472b6,#fb7185);}
.dinfo{flex:1;}
.dlabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px;}
.dtitle{font-size:16px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.dmeta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.mtag{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:600;}
.chev{font-size:18px;color:var(--text-muted);transition:transform 0.3s;}
.dcard.open .chev,.pdcard.open .chev{transform:rotate(180deg);}

.dbody{max-height:0;overflow:hidden;transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1);}
.dcard.open .dbody,.pdcard.open .dbody{max-height:2600px;}
.dbinner{padding:0 20px 20px;}

.exsec{margin-bottom:17px;}
.sectitle{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:7px;padding-bottom:5px;
  border-bottom:1px solid var(--section-divider);
  display:flex;align-items:center;gap:6px;
}
.sdot{width:5px;height:5px;border-radius:50%;display:inline-block;}

.exrow,.pexrow {
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;border-radius:11px;margin-bottom:5px;
  background:var(--row-bg);border:1px solid var(--row-border);
  transition:background 0.2s;
}
.exrow:hover{background:var(--row-hover);}
.pexrow{background:rgba(253,242,248,0.42);border-color:rgba(244,114,182,0.15);}
body.moonlight .pexrow{background:rgba(35,18,37,0.42);border-color:rgba(244,114,182,0.1);}
.pexrow:hover{background:rgba(253,242,248,0.72);}
.eicon,.peicon {
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.edet{flex:1;}
.en{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:1px;}
.enote{font-size:11px;color:var(--text-primary);opacity:0.6;}
.es{font-size:12px;font-weight:700;color:var(--violet);white-space:nowrap;align-self:center;}
body.moonlight .es{color:var(--violet-light);}
.ptbadge{font-size:11px;font-weight:700;color:var(--period-pink);white-space:nowrap;align-self:center;}

/* Pelvic section */
.pelvsec {
  background:var(--pelvic-bg);border:1px solid var(--pelvic-border);
  border-radius:14px;padding:13px 15px;margin-top:13px;
}
.pelvtitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--period-pink);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.pelvrow{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 10px;border-radius:10px;margin-bottom:4px;
  background:rgba(253,242,248,0.42);border:1px solid rgba(244,114,182,0.1);
}
body.moonlight .pelvrow{background:rgba(35,18,37,0.42);}
.ps{font-size:12px;font-weight:700;color:var(--period-pink);white-space:nowrap;align-self:center;}

/* Yoga section */
.yogasec {
  background:var(--yoga-bg);border:1px solid var(--yoga-border);
  border-radius:14px;padding:13px 15px;margin-top:13px;
}
.yogatitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:7px;}
.yogaposes{display:flex;flex-wrap:wrap;gap:5px;}
.ypose{background:rgba(20,184,166,0.1);border:1px solid rgba(20,184,166,0.18);color:#0d9488;font-size:11px;padding:4px 10px;border-radius:8px;font-weight:500;}
body.moonlight .ypose{color:var(--teal-light);}

/* Rest */
.restcard {
  background:var(--card-bg);border:1px dashed var(--rest-border);
  border-radius:22px;padding:26px;text-align:center;margin-bottom:14px;
}
.restcard h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text-primary);margin-bottom:3px;}
.restcard p{font-size:12px;color:var(--text-muted);}

/* Progress */
.progsec{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:22px;margin-top:30px;}
.progtitle{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text-primary);margin-bottom:15px;}
.proggrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:11px;}
.progcard{background:var(--progress-card);border:1px solid var(--card-border);border-radius:13px;padding:13px;text-align:center;}
.pwk{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.progcard ul{list-style:none;}
.progcard li{font-size:12px;color:var(--text-primary);opacity:0.78;padding:2px 0;display:flex;align-items:center;gap:5px;justify-content:center;}
.progcard li::before{content:'✦';font-size:7px;color:var(--rose);}

/* Period intro */
.pintro {
  background:linear-gradient(135deg,rgba(244,114,182,0.1),rgba(251,113,133,0.06));
  border:1px solid rgba(244,114,182,0.2);border-radius:17px;padding:19px;margin-bottom:20px;
}
.pintro h2{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:300;color:var(--period-pink);margin-bottom:5px;}
.pintro h2 em{font-style:italic;color:var(--rose-light);}
.pintro p{font-size:13px;color:var(--text-primary);opacity:0.78;line-height:1.5;}

/* Tuner */
.tuner{background:var(--card-bg);border:1px solid var(--card-border);border-radius:17px;padding:14px 15px;margin-bottom:18px;text-align:center;}
.tunertitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--period-pink);margin-bottom:9px;}
.tunerpills{display:flex;background:var(--status-track);border-radius:24px;padding:4px;gap:3px;}
.tbtn{flex:1;border:none;background:transparent;padding:9px 4px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:background 0.22s,color 0.22s;}
.tbtn.active{background:linear-gradient(135deg,var(--period-pink),var(--period-rose));color:white;}

<body>
<div class="page">

<!-- HERO -->
<section class="hero">
  <div class="orb" id="orb"></div>

  <nav>
    <div class="logo">FitFlow <span>✦</span></div>

  </nav>

    <div class="sw-label">Stopwatch</div>
    <div class="sw-time" id="swTime">00:00.00</div>
    <div class="sw-sub" id="swSub">Ready to start</div>

    <div class="controls">
      <button class="side-btn" id="lapBtn" onclick="lap()" title="Lap">🏁</button>
      <div class="play-wrap" id="playWrap">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <button class="play-btn" id="playBtn" onclick="toggle()">
          <svg id="pIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <button class="side-btn" id="resetBtn" onclick="resetSW()" title="Reset">🔁</button>
    </div>

    <div class="status-row">
      <div class="s-dot" id="sDot"></div>
      <span class="s-label" id="sLabel">Clocked Off</span>
    </div>
  </div>

  <!-- Week nav pill floats above the sheet edge -->
  <div class="nav-float">
    <div class="week-nav">
      <button class="week-btn active" onclick="sw(1,this)">1–2</button>
      <button class="week-btn" onclick="sw(2,this)">3–4</button>
      <button class="week-btn" onclick="sw(3,this)">5+</button>
      <button class="week-btn pd-btn" onclick="sw('p',this)">🌸 PD</button>
    </div>
  </div>
</section>

<!-- SEAMLESS CONTENT SHEET -->
<section class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="content" id="mc"></div>
</section>

<!-- FLOATING PILL STOPWATCH (BOTTOM CENTER) — TRIGGERS ON SCROLL -->
<div class="bottom-sw-pill" id="bottomSwPill">
  <span class="b-pill-icon">⏱️</span>
  <span class="b-pill-time" id="bPillTime">00:00.00</span>
  <button class="b-pill-btn" onclick="toggle()" id="bPillPlayBtn" title="Play / Pause">▶</button>
  <button class="b-pill-btn" onclick="resetSW()" title="Reset">🔁</button>
</div>

<script>
/* ── STOPWATCH ── */
let t0=0,el=0,iv=null,run=false,laps=0,lastLap=0;

function toggle(){run?pause():play();}

function play(){
  if(run)return;run=true;
  t0=Date.now()-el;iv=setInterval(tick,10);
  
  // Update main large play button
  document.getElementById('pIcon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  const pb=document.getElementById('playBtn');
  pb.classList.add('glow','bounce');
  setTimeout(()=>pb.classList.remove('bounce'),400);
  document.getElementById('playWrap').classList.add('running');
  document.getElementById('orb').classList.add('active');
  document.getElementById('sDot').classList.add('on');
  document.getElementById('sLabel').textContent='Clocked On';
  document.getElementById('swTime').classList.add('lit');
  document.getElementById('swSub').textContent=laps>0?`Lap ${laps}`:'Running…';
  
  // Update compact bottom pill play button
  document.getElementById('bPillPlayBtn').textContent = '⏸';
}

function pause(){
  if(!run)return;run=false;clearInterval(iv);
  
  // Update main large play button
  document.getElementById('pIcon').innerHTML='<path d="M8 5v14l11-7z"/>';
  const pb=document.getElementById('playBtn');
  pb.classList.remove('glow');pb.classList.add('bounce');
  setTimeout(()=>pb.classList.remove('bounce'),400);
  document.getElementById('playWrap').classList.remove('running');
  document.getElementById('orb').classList.remove('active');
  document.getElementById('sDot').classList.remove('on');
  document.getElementById('sLabel').textContent='Paused';
  document.getElementById('swTime').classList.remove('lit');
  document.getElementById('swSub').textContent='Paused — tap to resume';
  
  // Update compact bottom pill play button
  document.getElementById('bPillPlayBtn').textContent = '▶';
}

function resetSW(){
  pause();el=0;laps=0;lastLap=0;
  renderT(0);
  document.getElementById('sLabel').textContent='Clocked Off';
  document.getElementById('swSub').textContent='Ready to start';
  
  // Spin reset btn
  const rb=document.getElementById('resetBtn');
  rb.classList.remove('spin');void rb.offsetWidth;rb.classList.add('spin');
  setTimeout(()=>rb.classList.remove('spin'),600);
  
  // Flash overlay
  const f=document.createElement('div');f.className='rflash';
  document.body.appendChild(f);setTimeout(()=>f.remove(),700);
}

function lap(){
  if(!run)return;laps++;
  const lt=el-lastLap;lastLap=el;
  document.getElementById('swSub').textContent=`Lap ${laps} — ${fmt(lt)}`;
}

function tick(){el=Date.now()-t0;renderT(el);}

function renderT(ms){
  const cs=Math.floor((ms%1000)/10),s=Math.floor((ms/1000)%60),m=Math.floor(ms/60000)%60;
  const timeStr = `${p2(m)}:${p2(s)}.${p2(cs)}`;
  document.getElementById('swTime').textContent=timeStr;
  document.getElementById('bPillTime').textContent=timeStr;
}
function fmt(ms){const cs=Math.floor((ms%1000)/10),s=Math.floor((ms/1000)%60),m=Math.floor(ms/60000)%60;return`${p2(m)}:${p2(s)}.${p2(cs)}`;}
function p2(n){return n.toString().padStart(2,'0');}

/* ── INTERACTIVE MORPHING DETECTOR (SCROLL HANDLER) ── */
window.addEventListener('scroll', () => {
  // Triggers the bottom-center fixed pill to appear when scrolled past 220px
  if (window.scrollY > 220) {
    document.body.classList.add('scrolled');
  } else {
    document.body.classList.remove('scrolled');
  }
});

/* ── THEME ── */
function toggleMoon(){
  const m=document.body.classList.toggle('moonlight');
  document.getElementById('themeBtn').textContent=m?'☀️':'🌙';
  localStorage.setItem('ff_m',m?'1':'0');
}

let nrg='moderate';

function tc(t) {
  if(t==='Yoga'||t==='Mobility')return't-yoga';
  if(t==='Recovery'||t==='Rest')return't-recovery';
  if(t==='Gentle'||t==='No Heavy Intensity'||t==='Slow Pace')return't-gentle';
  if(t==='Core')return't-core';
  if(t.includes('Leg')||t.includes('Thigh'))return't-legs';
  if(t==='Cardio'||t==='HIIT')return't-cardio';
  return't-str';
}

function sw(w,btn){
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const sh=document.getElementById('sheet');
  sh.classList.remove('animate');void sh.offsetWidth;sh.classList.add('animate');
  w==='p'?renderP():renderW(w);
}

function renderW(w){
  const D=W[w];let h=``; // Stripped down block completely per user's styling request (No wbanner)
  const L=['M','T','W','T','F','S'];
  D.days.forEach((day,i)=>{
    const dtags=day.tags.map(t=>`<span class="mtag ${tc(t)}">${t}</span>`).join('');
    const wuH=day.wu.map(x=>`<div class="exrow"><div class="eicon i-warm">🌅</div><div class="edet"><div class="en">${x.split('—')[0].trim()}</div><div class="enote">${(x.split('—')[1]||'').trim()}</div></div></div>`).join('');
    const dc=day.secs[0]?.cl.includes('str')?'#8b5cf6':day.secs[0]?.cl.includes('core')?'#f43f5e':'#f59e0b';
    const secH=day.secs.map(s=>{
      const sc=s.cl.includes('str')?'#8b5cf6':s.cl.includes('core')?'#f43f5e':s.cl.includes('cardio')?'#ec4899':'#f59e0b';
      const rows=s.ex.map(x=>`<div class="exrow"><div class="eicon ${s.cl}">${s.ic}</div><div class="edet"><div class="en">${x.n}</div><div class="enote">${x.no}</div></div><div class="es">${x.s}</div></div>`).join('');
      return`<div class="exsec"><div class="sectitle"><span class="sdot" style="background:${sc}"></span>${s.t}</div>${rows}</div>`;
    }).join('');
    const yH=day.yoga?`<div class="yogasec"><div class="yogatitle">🧘 10–15 Min Yoga</div><div class="yogaposes">${day.yp.map(p=>`<span class="ypose">${p}</span>`).join('')}</div></div>`:'';
    const pH=day.pelv?.length?`<div class="pelvsec"><div class="pelvtitle">🌸 Pelvic Health Add-On</div>${day.pelv.map(x=>`<div class="pelvrow"><div class="eicon i-period">🌺</div><div class="edet"><div class="en">${x.n}</div><div class="enote">${x.no}</div></div><div class="ps">${x.s}</div></div>`).join('')}</div>`:'';
    h+=`<div class="dcard" id="dc${i}"><div class="dhead" onclick="tog('dc${i}')"><div class="dnum ${day.c}">${L[i]}</div><div class="dinfo"><div class="dlabel">${day.d}</div><div class="dtitle">${day.f}</div><div class="dmeta">${dtags}${day.yoga?'<span class="mtag t-yoga">🧘 Yoga</span>':''}<span class="mtag t-period">🌸 Pelvic</span></div></div><div class="chev">⌄</div></div><div class="dbody"><div class="dbinner"><div class="exsec"><div class="sectitle"><span class="sdot" style="background:#f59e0b"></span>Warm-Up (5 min)</div>${wuH}</div>${secH}${yH}${pH}</div></div></div>`;
  });
  h+=`<div class="restcard"><div style="font-size:36px;margin-bottom:6px">🌿</div><h3>Sunday — Rest & Recovery</h3><p>Light 20–30 min walk · Hydrate well · Sleep 7–8 hrs</p></div>
  <div class="progsec"><div class="progtitle">Expected Results</div><div class="proggrid">
    <div class="progcard"><div class="pwk" style="color:var(--rose)">4–6 Weeks</div><ul><li>Stronger body</li><li>Better posture</li><li>Flatter belly</li><li>Improved hip symmetry</li><li>Better stamina</li></ul></div>
    <div class="progcard"><div class="pwk" style="color:var(--violet)">8–12 Weeks</div><ul><li>Lean toned body</li><li>Flat abdomen</li><li>Shaped hips</li><li>Full push-ups achieved</li><li>Real endurance</li></ul></div>
    <div class="progcard"><div class="pwk" style="color:var(--teal)">Nutrition</div><ul><li>High protein: eggs, paneer, dal</li><li>Reduce sugar & maida</li><li>Eat within 1hr post-workout</li><li>3–4 litres water daily</li><li>Don't skip meals</li></ul></div>
    <div class="progcard"><div class="pwk" style="color:#f472b6">Pelvic Health</div><ul><li>Reduced period cramps</li><li>Better hip flexibility</li><li>Stronger pelvic floor</li><li>Less bloating</li><li>Improved blood flow</li></ul></div>
  </div></div>`;
  document.getElementById('mc').innerHTML=h;
  // Kept completely closed by default - no auto-opening as per user requirement.
}

function renderP(keep=false){
  let h=`<div class="pintro"><h2>Period Days — <em>Gentle Movement</em></h2><p>A 7-day low-intensity program for your menstrual cycle. Listen to your body, move gently, breathe deeply.</p></div>
  <div class="tuner"><div class="tunertitle">🌸 How are you feeling today?</div><div class="tunerpills">
    <button class="tbtn ${nrg==='lo'?'active':''}" id="eb-lo" onclick="setNrg('lo')">🛌 Low</button>
    <button class="tbtn ${nrg==='mo'?'active':''}" id="eb-mo" onclick="setNrg('mo')">🌸 Moderate</button>
    <button class="tbtn ${nrg==='hi'?'active':''}" id="eb-hi" onclick="setNrg('hi')">⚡ Active</button>
  </div><div class="enote" id="en">${nrg==='lo'?'🧘 Low: Only gentle stretching shown.':nrg==='hi'?'⚡ Active: All exercises with boosted sets.':'🌸 Moderate: Standard 7-day routine.'}</div></div>`;

  PD.forEach((day,i)=>{
    let adapted=[];
    day.ex.forEach(x=>{
      if(nrg==='lo'){if(x.e==='lo')adapted.push(x);}
      else if(nrg==='hi'){adapted.push({...x,s:x.e==='hi'?x.s.replace('2 ×','3 ×'):x.s});}
      else adapted.push(x);
    });
    if(!adapted.length)adapted=[{n:"Savasana / Meditation",s:"5 min",ic:"🧘",e:"lo"}];
    const tags=day.tags.map(t=>`<span class="mtag ${tc(t)}">${t}</span>`).join('');
    const rows=adapted.map(x=>`<div class="pexrow"><div class="peicon i-period">${x.ic}</div><div class="edet"><div class="en">${x.n}</div></div><div class="ptbadge">${x.s}</div></div>`).join('');
    h+=`<div class="pdcard" id="pd${i}"><div class="dhead" onclick="tog('pd${i}')"><div class="pdnum">D${day.num}</div><div class="dinfo"><div class="dlabel">${day.l} · ${day.t}</div><div class="dtitle">${day.f}</div><div class="dmeta">${tags}</div></div><div class="chev">⌄</div></div><div class="dbody"><div class="dbinner"><div class="exsec"><div class="sectitle"><span class="sdot" style="background:#f472b6"></span>Exercises</div>${rows}</div><div class="pgoal">💡 Goal: ${day.g}</div></div></div></div>`;
  });
  h+=`<div class="ptips"><h3>🌸 Important Tips</h3><ul><li>Strong cramps → do stretching or walking only.</li><li>Avoid intense HIIT, heavy abs, or lots of jumping when energy is low.</li><li>Stay hydrated; eat iron/protein-rich foods (dal, eggs, paneer, greens).</li><li>Dizziness or severe pain → stop immediately.</li><li>These workouts support circulation and mood, not weight loss.</li></ul></div>`;
  document.getElementById('mc').innerHTML=h;
  // Kept completely closed by default - no auto-opening as per user requirement.
}

function setNrg(v){
  nrg=v;
  ['lo','mo','hi'].forEach(k=>{const b=document.getElementById('eb-'+k);if(b)b.classList.toggle('active',k===v);});
  const notes={lo:'🧘 Low: Only gentle stretching shown.',mo:'🌸 Moderate: Standard 7-day routine.',hi:'⚡ Active: All exercises with boosted sets.'};
  const el=document.getElementById('en');if(el)el.textContent=notes[v];
  renderP(true);
}

function tog(id){document.getElementById(id).classList.toggle('open');}

renderW(1);
</script>
