<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow — 6-Day Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f43f5e;
    --rose-light: #fda4af;
    --rose-pale: #fff1f2;
    --violet: #8b5cf6;
    --violet-light: #c4b5fd;
    --violet-pale: #f5f3ff;
    --amber: #f59e0b;
    --teal: #14b8a6;
    --teal-light: #99f6e4;
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.5);
    --glass-shadow: rgba(139, 92, 246, 0.08);
    --text-dark: #1e1b4b;
    --text-mid: #4c1d95;
    --text-soft: #7c3aed;
    --period-pink: #f472b6;
    --period-rose: #fb7185;
    --period-soft: #fdf2f8;
    
    /* Stopwatch dashboard gradients */
    --stopwatch-bg: linear-gradient(180deg, #e0e7ff 0%, #ede9fe 100%);
    --play-btn-glow: rgba(139, 92, 246, 0.3);
  }

  /* MOONLIGHT THEME OVERRIDES */
  body.moonlight {
    --rose-pale: #1e112a;
    --violet-pale: #120b24;
    --period-soft: #231225;
    --glass-bg: rgba(30, 27, 75, 0.45);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-shadow: rgba(0, 0, 0, 0.3);
    --text-dark: #f1f0fb;
    --text-mid: #c4b5fd;
    --text-soft: #a78bfa;
    --stopwatch-bg: linear-gradient(180deg, #110925 0%, #090514 100%);
    --play-btn-glow: rgba(167, 139, 250, 0.25);
  }

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    transition: background 0.4s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 30%, #ecfdf5 60%, #fff1f2 100%);
    min-height: 100vh;
    color: var(--text-dark);
    overflow-x: hidden;
  }
  body.moonlight {
    background: linear-gradient(135deg, #090514 0%, #110925 35%, #0d1e21 70%, #170719 100%);
  }

  /* OVERLAY NAVIGATION */
  nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 600;
    color: var(--text-dark);
  }
  .nav-logo span {
    background: linear-gradient(135deg, var(--rose), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-toggle-btn {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    cursor: pointer;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px var(--glass-shadow);
  }
  .theme-toggle-btn:hover {
    transform: scale(1.05);
  }

  /* STOPWATCH DASHBOARD HEADER PANEL (MIMICS image_2222f8.png) */
  .dashboard-hero {
    background: var(--stopwatch-bg);
    padding: 80px 24px 48px;
    text-align: center;
    position: relative;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
  }
  .dashboard-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 24px;
    opacity: 0.8;
  }
  .dashboard-timer {
    font-family: monospace;
    font-size: clamp(48px, 12vw, 68px);
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: -2px;
    margin-bottom: 32px;
    text-shadow: 0 4px 12px var(--glass-shadow);
  }

  /* CENTRAL PLAY BUTTON INTEGRATION */
  .control-center {
    position: relative;
    width: 130px;
    height: 130px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-pulse-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: transparent;
    border: 2px solid var(--text-soft);
    opacity: 0;
    pointer-events: none;
  }
  
  /* Concentric halos that animate when stopwatch is running */
  .control-center.running .play-pulse-ring {
    animation: pulse-wave 2s infinite cubic-bezier(0.25, 0, 0, 1);
  }
  .control-center.running .play-pulse-ring:nth-child(2) {
    animation-delay: 0.6s;
  }
  .control-center.running .play-pulse-ring:nth-child(3) {
    animation-delay: 1.2s;
  }

  @keyframes pulse-wave {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .play-trigger-btn {
    position: relative;
    z-index: 5;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid #ffffff;
    background: linear-gradient(135deg, var(--rose) 0%, var(--violet) 100%);
    box-shadow: 0 8px 24px var(--play-btn-glow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  body.moonlight .play-trigger-btn {
    border-color: rgba(255, 255, 255, 0.15);
  }
  .play-trigger-btn:hover {
    transform: scale(1.05);
  }
  .play-trigger-btn:active {
    transform: scale(0.95);
  }
  .play-trigger-btn svg {
    width: 32px;
    height: 32px;
    fill: #ffffff;
    transition: transform 0.3s ease;
  }

  /* RESET BUTTON */
  .reset-trigger-btn {
    position: absolute;
    right: -48px;
    bottom: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    box-shadow: 0 4px 12px var(--glass-shadow);
    color: var(--text-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 10;
  }
  .reset-trigger-btn:active {
    transform: scale(0.9);
  }

  /* STATUS BADGE */
  .dashboard-status {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-mid);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0 auto;
    opacity: 0.9;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444; /* red when resting/clocked off */
    transition: background 0.3s;
  }
  .status-dot.active {
    background: #14b8a6; /* green when active/running */
    box-shadow: 0 0 10px #14b8a6;
  }

  /* WORKOUT NAVIGATION PILL */
  .week-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 32px auto 16px;
    padding: 6px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    max-width: fit-content;
    box-shadow: 0 8px 24px var(--glass-shadow);
  }
  .week-btn {
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dark);
    font-family: 'DM Sans', sans-serif;
  }
  .week-btn:hover {
    background: rgba(255, 255, 255, 0.25);
  }
  .week-btn.active {
    background: linear-gradient(135deg, var(--rose), var(--violet));
    color: white;
    box-shadow: 0 4px 15px rgba(244, 63, 94, 0.25);
  }
  .week-btn.period-btn {
    color: var(--period-pink);
  }
  .week-btn.period-btn.active {
    background: linear-gradient(135deg, #f472b6, #fb7185);
    box-shadow: 0 4px 15px rgba(244, 114, 182, 0.3);
  }

  /* MAIN CONTENT DRAWER */
  .content { max-width: 900px; margin: 0 auto; padding: 16px 16px 100px; position: relative; z-index: 1; }

  /* WEEK INFO BANNER */
  .week-banner {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 20px 24px;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px var(--glass-shadow);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  @media(min-width:640px) {
    .week-banner {
      flex-direction: row;
      align-items: center;
      gap: 16px;
    }
  }
  .week-banner .badge {
    background: linear-gradient(135deg, var(--rose), var(--violet));
    color: white; font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 15px;
    white-space: nowrap;
  }
  .week-banner p { 
    font-size: 14px; 
    color: var(--text-dark); 
    opacity: 0.9;
    line-height: 1.5; 
    flex: 1; 
  }

  /* AUTO-TUNER ENERGY SELECTOR */
  .tuner-container {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 16px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px var(--glass-shadow);
    text-align: center;
  }
  .tuner-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--period-pink);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tuner-selector {
    display: flex;
    background: rgba(0, 0, 0, 0.06);
    border-radius: 30px;
    padding: 4px;
    gap: 4px;
  }
  body.moonlight .tuner-selector {
    background: rgba(0, 0, 0, 0.2);
  }
  .tuner-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 4px;
    border-radius: 25px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tuner-btn.active {
    background: linear-gradient(135deg, var(--period-pink), var(--period-rose));
    color: white;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.25);
  }
  .energy-info-note {
    font-size: 12px;
    font-style: italic;
    color: var(--text-mid);
    margin-top: 10px;
    opacity: 0.9;
  }

  /* PERIOD BANNER */
  .period-intro-banner {
    background: linear-gradient(135deg, rgba(244,114,182,0.12), rgba(251,113,133,0.08));
    border: 1px solid rgba(244,114,182,0.25);
    border-radius: 20px; padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(244,114,182,0.1);
  }
  body.moonlight .period-intro-banner {
    background: linear-gradient(135deg, rgba(244,114,182,0.08), rgba(251,113,133,0.04));
    border-color: rgba(244,114,182,0.15);
  }
  .period-intro-banner h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300; color: var(--period-pink);
    margin-bottom: 8px;
  }
  .period-intro-banner h2 em { font-style: italic; color: var(--rose-light); }
  .period-intro-banner p { font-size: 14px; color: var(--text-dark); opacity: 0.85; line-height: 1.6; }

  /* IMPORTANT TIPS */
  .period-tips {
    background: linear-gradient(135deg, rgba(251,113,133,0.1), rgba(244,114,182,0.06));
    border: 1px solid rgba(244,114,182,0.2);
    border-radius: 16px; padding: 20px 24px;
    margin-top: 28px;
  }
  .period-tips h3 {
    font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--period-pink);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .period-tips ul { list-style: none; }
  .period-tips ul li {
    font-size: 13px; color: var(--text-dark); opacity: 0.9; padding: 5px 0;
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
  }
  .period-tips ul li::before { content: '🌸'; font-size: 12px; flex-shrink: 0; margin-top: 1px; }

  /* CARDS */
  .day-card, .period-day-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid var(--glass-border);
    border-radius: 24px; margin-bottom: 20px;
    box-shadow: 0 8px 40px var(--glass-shadow);
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: slideUp 0.5s ease both;
  }
  .day-card:hover, .period-day-card:hover { transform: translateY(-3px); box-shadow: 0 16px 56px var(--glass-shadow); }

  /* HIGH-LIGHT STRETCHING CARD */
  .period-day-card.highlighted-stretch {
    border: 2px solid var(--period-pink);
    box-shadow: 0 0 16px rgba(244, 114, 182, 0.4);
  }

  .day-header {
    padding: 20px 24px; cursor: pointer;
    display: flex; align-items: center; gap: 16px;
    user-select: none;
  }
  .day-number, .period-day-number {
    width: 52px; height: 52px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600; color: white;
    flex-shrink: 0;
  }
  .period-day-number {
    font-size: 18px;
    background: linear-gradient(135deg, #f472b6, #fb7185);
  }
  .day-info { flex: 1; }
  .day-name { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #9ca3af; margin-bottom: 2px; }
  .day-title { font-size: 18px; font-weight: 600; color: var(--text-dark); }
  .day-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .meta-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 10px;
    font-weight: 500;
  }
  .chevron { font-size: 20px; color: #9ca3af; transition: transform 0.3s ease; }
  .day-card.open .chevron, .period-day-card.open .chevron { transform: rotate(180deg); }

  .day-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .day-card.open .day-body, .period-day-card.open .day-body { max-height: 2000px; }
  .day-body-inner { padding: 0 24px 24px; }

  /* SECTION WITHIN DAY */
  .ex-section { margin-bottom: 20px; }
  .ex-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #9ca3af;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(139,92,246,0.1);
    display: flex; align-items: center; gap: 8px;
  }
  .ex-section-title span { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* PELVIC HEALTH SECTION */
  .pelvic-section {
    background: linear-gradient(135deg, rgba(244,114,182,0.08), rgba(251,113,133,0.05));
    border: 1px solid rgba(244,114,182,0.2);
    border-radius: 16px; padding: 16px 20px; margin-top: 16px;
  }
  body.moonlight .pelvic-section {
    background: linear-gradient(135deg, rgba(244,114,182,0.04), rgba(251,113,133,0.02));
    border-color: rgba(244,114,182,0.1);
  }
  .pelvic-section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: #f472b6;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .pelvic-ex-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 8px 12px; border-radius: 12px;
    margin-bottom: 6px;
    background: rgba(253,242,248,0.5);
    border: 1px solid rgba(244,114,182,0.12);
  }
  body.moonlight .pelvic-ex-row {
    background: rgba(35, 18, 37, 0.45);
    border-color: rgba(244,114,182,0.1);
  }
  .pelvic-sets {
    font-size: 13px; font-weight: 600; color: #f472b6;
    white-space: nowrap; align-self: center;
  }

  /* EXERCISE ROW */
  .ex-row, .period-ex-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 14px; border-radius: 14px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.5);
    transition: background 0.2s;
  }
  body.moonlight .ex-row {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.08);
  }
  .ex-row:hover, .period-ex-row:hover { background: rgba(255,255,255,0.55); }
  body.moonlight .ex-row:hover { background: rgba(255, 255, 255, 0.12); }
  
  .ex-icon, .period-ex-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .ex-details { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text-dark); margin-bottom: 2px; }
  .ex-note { font-size: 12px; color: var(--text-dark); opacity: 0.7; }
  .ex-sets {
    font-size: 13px; font-weight: 600; color: var(--text-soft);
    white-space: nowrap; align-self: center;
  }

  .period-ex-row {
    background: rgba(253, 242, 248, 0.5);
    border: 1px solid rgba(244, 114, 182, 0.15);
  }
  body.moonlight .period-ex-row {
    background: rgba(35, 18, 37, 0.45);
    border-color: rgba(244, 114, 182, 0.1);
  }

  /* YOGA SECTION */
  .yoga-section {
    background: linear-gradient(135deg, rgba(20,184,166,0.1), rgba(20,184,166,0.05));
    border: 1px solid rgba(20,184,166,0.2);
    border-radius: 16px; padding: 16px 20px; margin-top: 16px;
  }
  body.moonlight .yoga-section {
    background: linear-gradient(135deg, rgba(20,184,166,0.04), rgba(20,184,166,0.02));
    border-color: rgba(20,184,166,0.1);
  }
  .yoga-title {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--teal); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .yoga-poses { display: flex; flex-wrap: wrap; gap: 6px; }
  .yoga-pose {
    background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.2);
    color: #0f766e; font-size: 12px; padding: 4px 12px; border-radius: 10px;
    font-weight: 500;
  }
  body.moonlight .yoga-pose {
    background: rgba(20,184,166,0.08);
    color: var(--teal-light);
  }

  /* PROGRESS SECTION */
  .progress-section {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 24px;
    margin-top: 40px;
    box-shadow: 0 8px 32px var(--glass-shadow);
  }
  .progress-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 300; margin-bottom: 20px;
    color: var(--text-dark);
  }
  .progress-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .progress-card {
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 16px; padding: 16px;
    text-align: center;
  }
  body.moonlight .progress-card {
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(255, 255, 255, 0.05);
  }
  .progress-weeks { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; }
  .progress-card ul { list-style: none; }
  .progress-card li { font-size: 13px; color: var(--text-dark); opacity: 0.85; padding: 3px 0; display: flex; align-items: center; gap: 6px; justify-content: center; }
  .progress-card li::before { content: '✦'; font-size: 8px; color: var(--rose); }

  /* SUNDAY REST */
  .rest-card {
    background: rgba(255,255,255,0.2);
    border: 1px dashed rgba(139,92,246,0.2);
    border-radius: 24px; padding: 32px;
    text-align: center; color: #9ca3af;
    margin-bottom: 20px;
  }
  .rest-emoji { font-size: 40px; margin-bottom: 8px; }
  .rest-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; margin-bottom: 4px; color: var(--text-dark); }

  /* CONSTANT THEMES AND TAGS */
  .theme-rose { background: linear-gradient(135deg, #f43f5e, #fb7185); }
  .theme-violet { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
  .theme-teal { background: linear-gradient(135deg, #14b8a6, #2dd4bf); }
  .theme-amber { background: linear-gradient(135deg, #f59e0b, #fbbf24); }

function toggleMoonlight() {
  const isMoonlight = document.body.classList.toggle('moonlight');
  const btn = document.getElementById('themeToggleBtn');
  btn.innerHTML = isMoonlight ? "☀️" : "🌙";
  localStorage.setItem('fitflow_moonlight', isMoonlight ? 'true' : 'false');
}

if (localStorage.getItem('fitflow_moonlight') === 'true') {
  document.body.classList.add('moonlight');
  document.getElementById('themeToggleBtn').innerHTML = "☀️";
}

function selectEnergy(level) {
  currentEnergy = level;
  document.querySelectorAll('.tuner-btn').forEach(btn => btn.classList.remove('active'));
  
  const activeBtn = document.getElementById(`energy-${level}`);
  if (activeBtn) activeBtn.classList.add('active');
  
  const notes = {
    low: "🧘 Low Energy Mode: We highlighted relaxing yoga / deep breathing & collapsed heavy wall workouts.",
    moderate: "🌸 Balanced Mode: Standard 7-day routine. Moderate stretching, core, and posture works.",
    active: "⚡ Active Mode: All routines unlocked! Wall push-ups & light strength holds are fully responsive."
  };
  document.getElementById('energyNote').innerText = notes[level];
  renderPeriodWeek(true);
}

function switchWeek(w, btn){
  currentWeek = w;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(w === 'period'){
    renderPeriodWeek();
  } else {
    renderWeek(w);
  }
  window.scrollTo({top: document.getElementById('mainContent').offsetTop - 100, behavior: 'smooth'});
}

function renderPeriodWeek(keepEnergy = false){
  const cont = document.getElementById('mainContent');
  
  let html = `
    <div class="period-intro-banner">
      <h2>Period Days — <em>Gentle Movement Plan</em></h2>
      <p>A 7-day low-intensity program designed specifically for your menstrual cycle. Listen to your body — move gently, breathe deeply, and prioritize recovery.</p>
    </div>
    
    <div class="tuner-container">
      <div class="tuner-title">🌸 Auto-Tuner: How are you feeling today?</div>
      <div class="tuner-selector">
        <button class="tuner-btn ${currentEnergy === 'low' ? 'active' : ''}" id="energy-low" onclick="selectEnergy('low')">🛌 Low Energy</button>
        <button class="tuner-btn ${currentEnergy === 'moderate' ? 'active' : ''}" id="energy-moderate" onclick="selectEnergy('moderate')">🌸 Moderate</button>
        <button class="tuner-btn ${currentEnergy === 'active' ? 'active' : ''}" id="energy-active" onclick="selectEnergy('active')">⚡ Active</button>
      </div>
      <div class="energy-info-note" id="energyNote">
        ${
          currentEnergy === 'low' 
          ? "🧘 Low Energy Mode: We highlighted relaxing yoga / deep breathing & collapsed heavy wall workouts." 
          : currentEnergy === 'active' 
          ? "⚡ Active Mode: All routines unlocked! Wall push-ups & light strength holds are fully responsive." 
          : "🌸 Balanced Mode: Standard 7-day routine. Moderate stretching, core, and posture works."
        }
      </div>
    </div>
  `;

  PERIOD_DAYS.forEach((day, i) => {
    let adaptedExercises = [];
    let highlightStretch = false;

    day.exercises.forEach(ex => {
      if (currentEnergy === 'low') {
        if (ex.effort === 'high') {
          // Exclude high effort items
        } else {
          adaptedExercises.push({
            ...ex,
            sets: ex.name.includes("Breathing") || ex.name.includes("Pose") || ex.name.includes("Stretch") ? "Deep Hold — " + ex.sets : ex.sets
          });
          highlightStretch = true;
        }
      } else if (currentEnergy === 'active') {
        adaptedExercises.push({
          ...ex,
          sets: ex.effort === 'high' ? ex.sets.replace("2 ×", "3 ×") + " (⚡ active bonus)" : ex.sets
        });
      } else {
        adaptedExercises.push(ex);
      }
    });

    if (adaptedExercises.length === 0) {
      adaptedExercises.push({name: "Savasana Rest / Meditation", sets: "5 mins", icon: "🧘", effort: "low"});
    }

    const tags = day.tags.map(t => {
      const cls = t==='Yoga'||t==='Mobility'?'tag-yoga':t==='Recovery'||t==='Rest'?'tag-recovery':t==='Gentle'||t==='No Heavy Intensity'||t==='Slow Pace'?'tag-gentle':t==='Strength'?'tag-strength':'tag-cardio';
      return `<span class="meta-tag ${cls}">${t}</span>`;
    }).join('');

    const exRows = adaptedExercises.map(ex => `
      <div class="period-ex-row">
        <div class="period-ex-icon">${ex.icon}</div>
        <div class="ex-details">
          <div class="ex-name">${ex.name}</div>
        </div>
        <div class="period-time-badge">${ex.sets}</div>
      </div>
    `).join('');

    const cardHighlightClass = highlightStretch && currentEnergy === 'low' ? 'highlighted-stretch' : '';

    html += `
      <div class="period-day-card ${cardHighlightClass}" id="pcard-${i}">
        <div class="day-header" onclick="togglePeriodCard(${i})">
          <div class="period-day-number">D${day.dayNum}</div>
          <div class="day-info">
            <div class="day-name">${day.label} · ${day.time}</div>
            <div class="day-title">${day.focus}</div>
            <div class="day-meta">${tags}</div>
          </div>
          <div class="chevron">⌄</div>
        </div>
        <div class="day-body">
          <div class="day-body-inner">
            <div class="ex-section">
              <div class="ex-section-title"><span style="background:#f472b6"></span>Exercises</div>
              ${exRows}
            </div>
            <div class="period-goal-note">💡 Goal: ${day.goal}</div>
          </div>
        </div>
      </div>
    `;
  });

  html += `
    <div class="period-tips">
      <h3>🌸 Important Tips During Periods</h3>
      <ul>
        <li>If cramps are strong → do stretching or walking only.</li>
        <li>Avoid very intense HIIT, heavy abs, or lots of jumping if energy is low.</li>
        <li>Stay hydrated and eat enough iron/protein-rich food (dal, eggs, paneer, leafy greens).</li>
        <li>If dizziness or severe pain happens → stop exercise immediately.</li>
        <li>These workouts support circulation, reduce bloating, and improve mood — not for weight loss.</li>
      </ul>
    </div>
  `;

  cont.innerHTML = html;
}

/* COOPERATIVE ACCURATE MANUAL STOPWATCH */
let stopwatchStartTime = 0;
let stopwatchElapsedTime = 0;
let stopwatchInterval = null;
let stopwatchRunning = false;

function toggleTimer() {
  if (stopwatchRunning) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (!stopwatchRunning) {
    stopwatchRunning = true;
    stopwatchStartTime = Date.now() - stopwatchElapsedTime;
    stopwatchInterval = setInterval(updateStopwatch, 10);
    
    // Morph Play SVG into Pause SVG
    document.getElementById('playIcon').innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
    document.getElementById('playBtnContainer').classList.add('running');
    
    // Update status indicators mirroring image_2222f8.png
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusLabel').innerText = "Clocked On";
  }
}

function stopTimer() {
  if (stopwatchRunning) {
    stopwatchRunning = false;
    clearInterval(stopwatchInterval);
    stopwatchInterval = null;
    
    // Morph Pause SVG back to Play SVG
    document.getElementById('playIcon').innerHTML = `<path d="M8 5v14l11-7z"/>`;
    document.getElementById('playBtnContainer').classList.remove('running');
    
    // Update status indicators mirroring image_2222f8.png
    document.getElementById('statusDot').classList.remove('active');
    document.getElementById('statusLabel').innerText = "Clocked Off";
  }
}

function resetTimer() {
  stopTimer();
  stopwatchElapsedTime = 0;
  renderStopwatchTime(0);
}

function updateStopwatch() {
  stopwatchElapsedTime = Date.now() - stopwatchStartTime;
  renderStopwatchTime(stopwatchElapsedTime);
}

function renderStopwatchTime(time) {
  let centiseconds = Math.floor((time % 1000) / 10);
  let seconds = Math.floor((time / 1000) % 60);
  let minutes = Math.floor((time / 60000) % 60);

  let formattedCentiseconds = centiseconds.toString().padStart(2, '0');
  let formattedSeconds = seconds.toString().padStart(2, '0');
  let formattedMinutes = minutes.toString().padStart(2, '0');

  // Unified visual format
  document.getElementById('stopwatchTime').innerText = `${formattedMinutes}:${formattedSeconds}.${formattedCentiseconds}`;
}
